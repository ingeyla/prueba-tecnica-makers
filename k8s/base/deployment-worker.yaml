# Deployment: risk-worker (base)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-worker
  labels:
    app: risk-worker
    app.kubernetes.io/name: risk-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: novaledger
spec:
  replicas: 2

  selector:
    matchLabels:
      app: risk-worker
  template:
    metadata:
      labels:
        app: risk-worker
        app.kubernetes.io/name: risk-worker
    spec:
      serviceAccountName: risk-worker
      containers:
        - name: worker
          image: ghcr.io/example/risk-worker:v1.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: QUEUE_URL
              valueFrom:
                secretKeyRef:
                  name: risk-worker-queue
                  key: url
            - name: LOG_LEVEL
              value: "info"

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f worker || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "pgrep -f worker || exit 1"
            initialDelaySeconds: 5
            periodSeconds: 10
