# Prometheus Values — Base K8s
server:
  retention: 15d

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

alertmanager:
  enabled: true

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
